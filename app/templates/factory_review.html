<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTM Factory — AI-Approved Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0b0d12; color:#e8eaed; font-family:ui-sans-serif,system-ui,sans-serif; }
    .glass { background:rgba(255,255,255,.05); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.08); }
    .badge { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
    .score { background:rgba(255,255,255,.06); }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-4">
        <a href="/" class="px-3 py-1.5 rounded-lg glass hover:bg-white/10 text-sm text-white/70">← FASHN Review</a>
        <div>
          <h1 class="text-2xl font-semibold">MTM Factory — AI-Approved</h1>
          <p class="text-sm text-white/50">Claude reviewer bunları onayladı. Beğenmezsen reject et →
            siteden kalkar, reklam durur, yeniden üretilir, ve agent bunu öğrenir.</p>
        </div>
      </div>
      <div id="count" class="text-sm text-white/60"></div>
    </header>

    <!-- cost / credit usage -->
    <div id="costs" class="glass rounded-xl p-4 mb-6 flex flex-wrap items-center gap-6 text-sm">
      <span class="text-white/40">Yükleniyor…</span>
    </div>

    <!-- steer the agent -->
    <div class="glass rounded-xl p-4 mb-6">
      <label class="text-sm text-white/70">Agent'a genel ders ver (reject etmeden):</label>
      <div class="flex gap-2 mt-2">
        <input id="lesson" type="text" placeholder="ör. modelin gözleri şaşı olmasın, eller hep görünür olsun"
               class="flex-1 bg-black/30 rounded-lg px-3 py-2 text-sm outline-none border border-white/10" />
        <button onclick="addLesson()" class="px-4 py-2 rounded-lg glass hover:bg-white/10 text-sm">Kaydet</button>
      </div>
      <p id="lesson-msg" class="text-xs text-emerald-400 mt-1"></p>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    <div id="empty" class="hidden text-center text-white/40 py-20">Onay bekleyen AI-onaylı ürün yok.</div>
  </div>

  <script>
    async function load() {
      const r = await fetch('/api/factory-pending');
      const d = await r.json();
      document.getElementById('count').textContent = d.count + ' ürün';
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      document.getElementById('empty').classList.toggle('hidden', d.count > 0);
      for (const it of d.items) {
        const rev = it.review || {};
        const sc = rev.scores || {};
        const scores = ['realism','suit_correct','fabric_match','no_artifacts']
          .map(k => `<span class="score rounded px-1.5 py-0.5 text-[11px]">${k.replace('_',' ')}: ${sc[k] ?? '-'}</span>`).join(' ');
        const card = document.createElement('div');
        card.className = 'glass rounded-xl overflow-hidden flex flex-col';
        const thumb = (u, w) => `/api/thumb?u=${encodeURIComponent(u)}&w=${w}`;
        const swatch = it.swatch_url
          ? `<a href="${it.swatch_url}" target="_blank" title="Kumaş swatch — ${it.fabric_book || ''}" class="shrink-0">
               <img src="${thumb(it.swatch_url, 120)}" loading="lazy"
                    class="w-14 h-14 rounded-lg object-cover border border-white/15" />
             </a>` : '';
        card.innerHTML = `
          <div class="relative">
            <a href="${it.image_r2_url}" target="_blank">
              <img src="${thumb(it.image_r2_url, 440)}" class="w-full aspect-[3/4] object-cover" loading="lazy" />
            </a>
            <span class="badge absolute top-2 left-2 text-[11px] px-2 py-0.5 rounded-full">✓ AI onayladı ${rev.composite ?? ''}</span>
            <span class="absolute top-2 right-2 text-[11px] px-2 py-0.5 rounded-full bg-black/50">${it.status}</span>
          </div>
          <div class="p-3 flex-1 flex flex-col gap-2">
            <div class="flex items-center gap-2">
              ${swatch}
              <div class="min-w-0">
                <div class="text-sm font-medium truncate">${it.fabric_code} · ${it.concept}</div>
                <div class="text-[11px] text-white/40 truncate">${it.fabric_book || ''}</div>
                ${swatch ? '<div class="text-[10px] text-white/35">↑ kumaş — takıma benziyor mu?</div>' : ''}
              </div>
            </div>
            <div class="flex flex-wrap gap-1">${scores}</div>
            ${rev.reason ? `<div class="text-[11px] text-white/45 italic">"${rev.reason}"</div>` : ''}
            <div class="mt-auto flex gap-2 pt-2">
              ${it.landing_url ? `<a href="${it.landing_url}" target="_blank" class="text-[12px] text-sky-400 hover:underline">Landing ↗</a>` : ''}
              <button class="ml-auto px-3 py-1.5 rounded-lg bg-red-500/15 text-red-300 border border-red-500/30 hover:bg-red-500/25 text-[12px]"
                      onclick='reject(${JSON.stringify(it.experiment_key)})'>Reject + öğret</button>
            </div>
          </div>`;
        grid.appendChild(card);
      }
    }

    async function reject(key) {
      const reason = prompt('Neden reddediyorsun? (agent bunu öğrenecek)\nör. "adamın gözleri amuk", "kumaş rengi yanlış"');
      if (!reason) return;
      const r = await fetch('/api/factory-reject/' + encodeURIComponent(key), {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ reason })
      });
      const d = await r.json();
      if (d.status === 'overridden') {
        alert('Reddedildi ✓\n• Siteden kaldırıldı: ' + (d.saleor_unpublished ? 'evet' : 'hayır')
              + '\n• Reklam duracak + yeniden üretilecek\n• Agent bu dersi öğrendi');
        load();
      } else {
        alert('Hata: ' + (d.error || d.saleor_error || 'bilinmiyor'));
      }
    }

    async function addLesson() {
      const el = document.getElementById('lesson');
      const lesson = el.value.trim();
      if (!lesson) return;
      const r = await fetch('/api/factory-learning', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ lesson, severity: 'warn' })
      });
      if (r.ok) { document.getElementById('lesson-msg').textContent = 'Kaydedildi ✓ — reviewer bundan sonra uygulayacak'; el.value = ''; }
    }

    async function loadCosts() {
      try {
        const d = await (await fetch('/api/factory-costs')).json();
        const p = d.by_period || {}, k = d.by_kind || {};
        const kindLabel = {vertex_image: 'Vertex görsel', claude_review: 'Claude review', gemini_review: 'Gemini review'};
        const kinds = Object.keys(k).map(x =>
          `<span class="text-white/50">${kindLabel[x]||x}: <b class="text-white/80">$${k[x].cost}</b> <span class="text-white/30">(${k[x].count})</span></span>`
        ).join(' · ');
        document.getElementById('costs').innerHTML = `
          <span class="text-white/40 uppercase text-xs tracking-wide">Harcama</span>
          <span>Bugün <b class="text-emerald-300">$${p.today ?? 0}</b></span>
          <span>Bu hafta <b class="text-emerald-300">$${p.week ?? 0}</b></span>
          <span>Bu ay <b class="text-amber-300">$${p.month ?? 0}</b></span>
          <span class="text-white/30">Toplam $${p.all ?? 0}</span>
          ${kinds ? `<span class="text-white/30">|</span> ${kinds}` : ''}
          <span class="ml-auto text-[11px] text-white/30">Vertex = gerçek Google Cloud · Claude = Max plan kullanımı</span>`;
      } catch (e) { document.getElementById('costs').innerHTML = '<span class="text-red-300/70 text-xs">maliyet yüklenemedi</span>'; }
    }

    load();
    loadCosts();
    setInterval(load, 30000);
    setInterval(loadCosts, 60000);
  </script>
</body>
</html>
